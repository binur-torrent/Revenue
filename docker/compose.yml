
services:
  postgres:
    image: postgres:16-alpine
    container_name: revenue-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: revenue_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: