
services:
  postgres:
    image: postgres:15-alpine
    container_name: revenue-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: revenue_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: